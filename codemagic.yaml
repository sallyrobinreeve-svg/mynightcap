workflows:
  ios-nightcap:
    name: NightCap iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nightcap.app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Create www directory for Capacitor
        script: mkdir -p www && echo '<!DOCTYPE html><html><body></body></html>' > www/index.html
      - name: Add iOS platform and sync
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR/ios/App
          pod repo update
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA for App Store
        script: |
          cd $CM_BUILD_DIR/ios/App
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
