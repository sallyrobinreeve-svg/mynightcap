workflows:
  ios-nightcap:
    name: NightCapt iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mynightcap.app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Create www directory for Capacitor
        script: mkdir -p www && echo '<!DOCTYPE html><html><body></body></html>' > www/index.html
      - name: Add iOS platform and sync
        script: |
          npx cap add ios --packagemanager CocoaPods
          npx cap sync ios
      - name: Add Camera/Photo Library permissions to Info.plist
        script: |
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'NightCapt uses the camera for profile photos'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'NightCapt needs photo library access for profile pictures and journal entries'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'NightCapt saves photos to your journal entries'" "$PLIST" 2>/dev/null || true
      - name: Generate app icon
        script: npx capacitor-assets generate --ios
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR/ios/App
          pod repo update
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Verify iOS project structure
        script: |
          ls -la $CM_BUILD_DIR/ios/App/
          ls -la $CM_BUILD_DIR/ios/App/*.xcworkspace 2>/dev/null || true
      - name: Set unique build number
        script: |
          BUILD_NUM=$(date +%s)
          echo "Setting build number to $BUILD_NUM"
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" $CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj
      - name: Build IPA for App Store
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App --ipa-directory $CM_BUILD_DIR/ios/App/build/ios/ipa -v
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
