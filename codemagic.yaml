workflows:
  ios-nightcap:
    name: NightCap iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nightcap.app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform and sync
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA for App Store
        script: |
          cd ios/App
          xcode-project build-ipa --workspace App.xcworkspace --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    # Add App Store Connect API key in Codemagic UI (Team → Integrations → App Store Connect),
    # then uncomment and add your env group:
    # publishing:
    #   app_store_connect:
    #     api_key: $APP_STORE_CONNECT_PRIVATE_KEY
    #     key_id: $APP_STORE_CONNECT_KEY_ID
    #     issuer_id: $APP_STORE_CONNECT_ISSUER_ID
    #     submit_to_testflight: true
